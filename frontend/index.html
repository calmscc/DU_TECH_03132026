<!DOCTYPE html>
<html>

<head>

<title>NOLAlytics AI Retail Visibility Analyzer</title>

<style>

body{
 font-family:Arial;
 max-width:900px;
 margin:auto;
 padding:40px;
 background:#f9f9f9;
}

h1{
 color:#333;
}

button{
 padding:10px 15px;
 margin-top:10px;
 cursor:pointer;
}

input{
 padding:8px;
 margin-right:10px;
}

#results{
 margin-top:20px;
 font-size:18px;
 background:white;
 padding:15px;
 border-radius:8px;
}

#products{
 margin-top:30px;
 background:white;
 padding:15px;
 border-radius:8px;
}

.product-card{
 border-bottom:1px solid #ddd;
 padding:10px;
}

.product-title{
 font-weight:bold;
}

</style>

</head>

<body>

<h1>NOLAlytics AI Retail Visibility Analyzer</h1>

<h2>Analyze AI Shopping Visibility</h2>

<input id="productInput" placeholder="Enter product (example: headphones)" />

<button onclick="runAudit()">Analyze Visibility</button>

<h3>Results</h3>

<div id="results"></div>

<hr>

<h2>Retail Product Explorer</h2>

<input id="categoryInput" placeholder="Category (tools, electronics)" />

<button onclick="loadCategory()">Load Category</button>

<div id="products"></div>

<script>

const API_BASE = "";

async function runAudit(){

 const product = document.getElementById("productInput").value

 document.getElementById("results").innerHTML =
 "Analyzing AI recommendations..."

 const res = await fetch(`${API_BASE}/api/audit`,{

  method:"POST",

  headers:{
   "Content-Type":"application/json"
  },

  body:JSON.stringify({ product })

 })

 const data = await res.json()

 let rankingHTML = "<h3>Store Rankings</h3>"

 data.rankings.forEach(r=>{
  rankingHTML += `${r.store} — ${r.mentions} mentions<br>`
 })

 document.getElementById("results").innerHTML = `

  <h3>AI Retail Visibility Results</h3>

  Product: <b>${data.product}</b><br><br>

  ${rankingHTML}

  <br>
  Queries Tested: ${data.promptsTested}

 `

}

/*
=====================================================
LOAD PRODUCTS BY CATEGORY
=====================================================
*/

async function loadCategory(){

 const category =
 document.getElementById("categoryInput").value

 const res = await fetch(
 `${API_BASE}/api/products/category/${category}`
 )

 const data = await res.json()

 renderProducts(data)

}

/*
=====================================================
RENDER PRODUCTS
=====================================================
*/

function renderProducts(products){

 const container = document.getElementById("products")

 container.innerHTML = ""

 products.forEach(p=>{

  container.innerHTML += `

   <div class="product-card">

    <div class="product-title">${p.name}</div>

    Brand: ${p.brand} <br>
    Category: ${p.category} <br>
    Store: ${p.store} <br>
    Price: $${p.price} <br>
    Rating: ${p.rating}

   </div>

  `

 })

}

</script>

</body>

</html>
