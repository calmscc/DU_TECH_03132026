<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOLAlytics AI Visibility Dashboard</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<h1>NOLAlytics AI Product Visibility Analyzer</h1>

<p>
Measure how often your products appear in AI-generated recommendations
and identify competitors dominating AI product discovery.
</p>

<div class="section">

<h2>Run AI Visibility Audit</h2>

<input id="product" type="text" placeholder="Product (example: hammer)">
<input id="brand" type="text" placeholder="Brand or Retailer (example: Walmart)">

<button onclick="run()">Analyze</button>

</div>


<div id="results-section" style="display:none">

<div class="section" id="summary"></div>

<div class="section" id="insight"></div>

<div class="section">
<h2>AI Retailer Leaderboard</h2>
<div id="competitors"></div>
</div>

<div class="section">
<h2>AI Shopping Queries</h2>
<div id="queries"></div>
</div>

<div class="section">
<h2>Full AI Responses</h2>
<div id="responses"></div>
</div>

</div>

<script src="/static/dashboard.js"></script>

</body>
</html>
