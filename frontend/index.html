<!DOCTYPE html>
<html>

<head>

<title>NOLAlytics AI Analyzer</title>

<style>

body{
 font-family:Arial;
 max-width:900px;
 margin:auto;
 padding:40px;
 background:#f9f9f9;
}

h1{
 color:#333;
}

button{
 padding:10px 15px;
 margin-top:10px;
 cursor:pointer;
}

input{
 padding:8px;
 margin-right:10px;
}

#progress{
 font-size:24px;
 font-weight:bold;
}

#prompt{
 background:#eeeeee;
 padding:10px;
 margin-top:10px;
}

#results{
 margin-top:20px;
 font-size:18px;
}

#products{
 margin-top:30px;
 background:white;
 padding:15px;
 border-radius:8px;
}

.product-card{
 border-bottom:1px solid #ddd;
 padding:10px;
}

.product-title{
 font-weight:bold;
}

</style>

</head>

<body>

<h1>NOLAlytics AI Product Visibility Analyzer</h1>

<!-- Product Audit -->

<h2>Run AI Visibility Audit</h2>

<input id="productInput" placeholder="Enter product (example: hammer)" />

<button onclick="startAudit()">Run Audit</button>

<h3>Progress</h3>

<div id="progress">0%</div>

<h3>Current Prompt</h3>

<div id="prompt"></div>

<h3>Results</h3>

<div id="results"></div>

<hr>

<!-- Product Browser -->

<h2>Retail Product Explorer</h2>

<input id="categoryInput" placeholder="Category (tools, electronics)" />

<button onclick="loadCategory()">Load Category</button>

<input id="brandInput" placeholder="Search brand" />

<button onclick="searchBrand()">Search Brand</button>

<div id="products"></div>

<script>



const API_BASE = "https://botb.onrender.com";

/*
=====================================================
START AI AUDIT
=====================================================
*/

async function startAudit(){

 const product = document.getElementById("productInput").value

 await fetch(`${API_BASE}/api/audit`,{

  method:"POST",

  headers:{
   "Content-Type":"application/json"
  },

  body:JSON.stringify({ product })

 })

 monitorProgress()

}

/*
=====================================================
MONITOR AUDIT PROGRESS
=====================================================
*/

async function monitorProgress(){

 const interval = setInterval(async ()=>{

  const res = await fetch(`${API_BASE}/api/status`)

  const data = await res.json()

  document.getElementById("progress").innerText =
   data.progress + "%"

  document.getElementById("prompt").innerText =
   data.currentPrompt

  if(data.completed){

   clearInterval(interval)

   document.getElementById("results").innerHTML = `
    Visibility Score: ${data.results.visibilityScore}% <br>
    Prompts Tested: ${data.results.promptsTested}
   `

  }

 },1000)

}

/*
=====================================================
LOAD PRODUCTS BY CATEGORY
=====================================================
*/

async function loadCategory(){

 const category =
 document.getElementById("categoryInput").value

 const res = await fetch(
 `${API_BASE}/api/products/category/${category}`
 )

 const data = await res.json()

 renderProducts(data)

}

/*
=====================================================
SEARCH PRODUCTS BY BRAND
=====================================================
*/

async function searchBrand(){

 const brand =
 document.getElementById("brandInput").value

 const res = await fetch(
 `${API_BASE}/api/products/search/${brand}`
 )

 const data = await res.json()

 renderProducts(data)

}

/*
=====================================================
RENDER PRODUCTS
=====================================================
*/

function renderProducts(products){

 const container = document.getElementById("products")

 container.innerHTML = ""

 products.forEach(p=>{

  container.innerHTML += `

   <div class="product-card">

    <div class="product-title">${p.name}</div>

    Brand: ${p.brand} <br>

    Category: ${p.category} <br>

    Store: ${p.store} <br>

    Price: $${p.price} <br>

    Rating: ${p.rating}

   </div>

  `

 })

}
 
</script>

</body>

</html>
